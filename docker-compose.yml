services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: riskguard
      POSTGRES_PASSWORD: riskguard
      POSTGRES_DB: riskguard
    ports:
      - "5432:5432"
    volumes:
      - riskguard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riskguard -d riskguard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  riskguard_pgdata:
